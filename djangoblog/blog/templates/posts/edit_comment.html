{% extends 'posts/base.html' %}
{% block title %}Edit Comment{% endblock %}
{% block content %}
<h1>Edit Comment</h1>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="author" class="form-label">Author</label>
        <input type="text" class="form-control" id="author" name="author" value="{{ comment.author }}" required>
    </div>
    <div class="mb-3">
        <label for="text" class="form-label">Comment</label>
        <textarea class="form-control" id="text" name="text" rows="3" required>{{ comment.text }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Update</button>
    <a href="{% url 'post_detail' comment.post.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
