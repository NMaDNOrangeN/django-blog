{% extends 'posts/base.html' %}
{% block title %}Delete Comment{% endblock %}
{% block content %}
<h1>Delete Comment</h1>
<p>Are you sure you want to delete this comment by {{ comment.author }}?</p>
<p><strong>{{ comment.text }}</strong></p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'post_detail' comment.post.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
